name: actualizar-gasolineras

on:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * *"

permissions:
  contents: write

jobs:

  ejecutar:

    runs-on: ubuntu-latest

    steps:

      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Instalar Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      - name: Ejecutar programa
        run: mvn clean compile exec:java -Dexec.mainClass="org.example.Main"

      - name: Subir GeoJSON
        run: |

          if git diff --quiet; then
            echo "Sin cambios"
            exit 0
          fi

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add *.geojson

          git commit -m "Actualizacion diaria gasolineras"

          git push
