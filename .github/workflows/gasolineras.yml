name: actualizar-gasolineras

# Cuándo se ejecuta el workflow
on:
  workflow_dispatch:   # Permite lanzarlo manualmente
  schedule:
    - cron: "15 5 * * *"  # Ejecución diaria a las 05:15 UTC

# Permisos necesarios para hacer push al repositorio
permissions:
  contents: write

jobs:

  ejecutar:

    runs-on: ubuntu-latest

    steps:

      # Descarga el repositorio en la máquina virtual
      - name: Descargar repositorio
        uses: actions/checkout@v4

      # Instala Java (necesario para ejecutar el proyecto)
      - name: Instalar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Instala Chrome (necesario para Selenium)
      - name: Instalar Chrome
        run: |
          sudo apt update
          sudo apt install -y google-chrome-stable

      # Ejecuta el programa Java (descarga datos + genera JSON y histórico)
      - name: Ejecutar programa
        run: mvn clean compile exec:java -Dexec.mainClass="org.example.Main"

      # Añade, commitea y sube los archivos generados
      - name: Subir GeoJSON e histórico
        run: |

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Añade archivos generados (diarios + histórico)
          git add *.geojson historico/*.geojson historico/*.json

          # Si no hay cambios, no hace commit
          if git diff --cached --quiet; then
            echo "Sin cambios"
            exit 0
          fi

          # Commit y push
          git commit -m "Actualizacion diaria gasolineras"
          git push
